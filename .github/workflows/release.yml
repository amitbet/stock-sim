  build-wails-windows:
    needs:
      - verify
      - version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build Wails app
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          export PATH="${PATH}:$(go env GOPATH | tr -d '\r')/bin"
          wails build -ldflags "-X stock-sim/internal/version.Version=${{ needs.version.outputs.version }} -X stock-sim/internal/version.UpdateRepo=${{ github.repository }}" -platform windows/amd64

      - name: Zip build output
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          $archive = "stock-sim-windows-amd64-v${env:RELEASE_VERSION}.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }
          Compress-Archive -Path "build/bin/*" -DestinationPath $archive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-desktop
          path: stock-sim-windows-amd64-*.zip

  release:
    needs:
      - build-wails-macos
      - build-wails-windows
      - version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Write release notes
        shell: bash
        env:
          TAG: ${{ needs.version.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          {
            echo "Official release \`${TAG}\` for commit [\`${SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})."
            echo ""
            echo "### Commit message"
            echo ""
            git log -1 --pretty=%B "${SHA}"
            echo ""
            echo "### Artifacts"
            echo "- \`stock-sim-darwin-arm64-*.zip\` — macOS Apple Silicon desktop app (portable .app)"
            echo "- \`stock-sim-windows-amd64-*.zip\` — Windows desktop app (portable folder)"
          } > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ needs.version.outputs.tag }}
          make_latest: true
          files: release-artifacts/*
          body_path: release-notes.md
