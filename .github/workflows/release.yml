  build-wails-macos:
    needs:
      - verify
      - version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build Wails app (portable .app)
        env:
          CGO_ENABLED: "1"
        run: |
          export PATH="${PATH}:$(go env GOPATH)/bin"
          wails build -ldflags "-X stock-sim/internal/version.Version=${{ needs.version.outputs.version }} -X stock-sim/internal/version.UpdateRepo=${{ github.repository }}" -platform darwin/arm64

      - name: Zip .app bundle
        env:
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          cd build/bin
          zip -r "../../stock-sim-darwin-arm64-v${RELEASE_VERSION}.zip" stock-sim.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-desktop
          path: stock-sim-darwin-arm64-*.zip

